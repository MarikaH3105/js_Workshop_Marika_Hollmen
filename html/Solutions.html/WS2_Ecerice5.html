<!DOCTYPE html>

<html lang="en">   
<head>
    <meta charset="UTF-8">
    <title>JS-WS2_Excerices 1,2,3,4 & </title>
</head>
<body>
   

    <h1>Excerice 5</h1> <br />

<img id="pic" src="" width="240" alt="random image">
<button id="rand">Random image</button>


<script>
  const images = [
    'https://farm4.staticflickr.com/3691/11268502654_f28f05966c_m.jpg',
    'https://farm1.staticflickr.com/33/45336904_1aef569b30_n.jpg',
    'https://farm6.staticflickr.com/5211/5384592886_80a512e2c9.jpg'
  ];

  function showRandomImage() {
    const index = Math.floor(Math.random() * images.length);
    document.getElementById('pic').src = images[index];
  }

  document.getElementById('rand').addEventListener('click', showRandomImage);

  // show one image when page loads
  showRandomImage();
</script>
</body>
</html>
